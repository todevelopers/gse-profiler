name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  version-bump:
    name: Bump version in source
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.vars.outputs.version }}
      sha: ${{ steps.push.outputs.sha }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: vars
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Patch _BASE_VERSION in main.py
        run: |
          sed -i 's/_BASE_VERSION = ".*"/_BASE_VERSION = "${{ steps.vars.outputs.version }}"/' app/main.py

      - name: Commit and re-tag
        id: push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/main.py
          if git diff --cached --quiet; then
            echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: bump version to ${{ steps.vars.outputs.version }} [skip ci]"
            git push origin HEAD:main
            git tag -f "$GITHUB_REF_NAME" HEAD
            git push -f origin "$GITHUB_REF_NAME"
            echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          fi

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: version-bump
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.version-bump.outputs.sha }}

      - name: Build source tarball
        run: |
          VERSION="${{ needs.version-bump.outputs.version }}"
          git archive --format=tar.gz \
            --prefix="gse-profiler-${VERSION}/" \
            -o "gse-profiler-${VERSION}.tar.gz" \
            HEAD
          echo "TARBALL=gse-profiler-${VERSION}.tar.gz" >> "$GITHUB_ENV"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"

      - name: Generate changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [[ -n "$PREV_TAG" ]]; then
            git log --oneline "${PREV_TAG}..HEAD" > CHANGELOG.txt
          else
            git log --oneline HEAD > CHANGELOG.txt
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ needs.version-bump.outputs.version }}"
          name: "GSE Profiler ${{ needs.version-bump.outputs.version }}"
          body_path: CHANGELOG.txt
          files: ${{ env.TARBALL }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

  flatpak:
    name: Build Flatpak
    runs-on: ubuntu-latest
    needs: version-bump
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.version-bump.outputs.sha }}

      - name: Install flatpak and flatpak-builder
        run: |
          sudo apt-get update -y
          sudo apt-get install -y flatpak flatpak-builder

      - name: Set up Flathub and install GNOME runtime (user)
        run: |
          flatpak --user remote-add --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo
          flatpak --user install -y flathub org.gnome.Platform//50 org.gnome.Sdk//50

      - name: Inject release entry into metainfo
        run: |
          VERSION="${{ needs.version-bump.outputs.version }}"
          DATE=$(date -u +%Y-%m-%d)
          sed -i \
            "s|<!-- injected by CI on each release -->|<release version=\"${VERSION}\" date=\"${DATE}\"/>|" \
            data/io.github.todevelopers.GseProfiler.metainfo.xml

      - name: Build Flatpak bundle
        run: |
          VERSION="${{ needs.version-bump.outputs.version }}"
          flatpak-builder \
            --disable-rofiles-fuse \
            --force-clean \
            --repo=repo \
            flatpak_app \
            build-aux/io.github.todevelopers.GseProfiler.yml
          flatpak build-bundle repo \
            --runtime-repo=https://dl.flathub.org/repo/flathub.flatpakrepo \
            "gse-profiler-${VERSION}-x86_64.flatpak" \
            io.github.todevelopers.GseProfiler

      - name: Attach Flatpak bundle to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ needs.version-bump.outputs.version }}"
          files: "gse-profiler-${{ needs.version-bump.outputs.version }}-x86_64.flatpak"
