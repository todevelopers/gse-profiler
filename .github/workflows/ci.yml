name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  # ── Python: lint + type-check + test ──────────────────────────────────────────
  python:
    name: Python (ruff · mypy · pytest)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dev dependencies
        run: pip install ruff mypy pytest

      - name: ruff check
        run: ruff check app/

      - name: mypy
        run: mypy app/

      - name: pytest
        run: pytest tests/ -v --tb=short

  # ── Bridge: keep bundle-hash in metadata.json in sync ────────────────────────
  bridge-hash:
    name: Bridge hash sync
    runs-on: ubuntu-latest
    # Only meaningful on direct pushes — PRs from forks can't push back.
    if: github.event_name == 'push'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Check if bridge JS files changed
        id: changed
        run: |
          if git diff --name-only HEAD~1 HEAD 2>/dev/null | grep -q '^bridge-extension/.*\.js$'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Recompute bundle-hash
        if: steps.changed.outputs.changed == 'true'
        run: python3 scripts/update-bridge-hash.py

      - name: Commit updated metadata.json
        if: steps.changed.outputs.changed == 'true'
        run: |
          if ! git diff --quiet bridge-extension/metadata.json; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add bridge-extension/metadata.json
            git commit -m "chore(bridge): update bundle-hash [skip ci]"
            git push
          fi

  # ── JavaScript: ESLint ────────────────────────────────────────────────────────
  javascript:
    name: JavaScript (eslint)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: ESLint
        run: npm run lint
