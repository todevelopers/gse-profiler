name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  # ── Python: lint + type-check + test ──────────────────────────────────────────
  python:
    name: Python (ruff · mypy · pytest)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dev dependencies
        run: pip install ruff mypy pytest

      - name: ruff check
        run: ruff check app/

      - name: mypy
        run: mypy app/

      - name: pytest
        run: pytest tests/ -v --tb=short

  # ── JavaScript: ESLint ────────────────────────────────────────────────────────
  javascript:
    name: JavaScript (eslint)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: ESLint
        run: npm run lint
