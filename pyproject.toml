[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
# E501 (line too long) — long description strings in placeholder views are acceptable
ignore = ["E501"]

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true
# PyGObject does not ship inline type stubs; ignore missing imports globally.
ignore_missing_imports = true
files = ["app/"]

[tool.pytest.ini_options]
testpaths = ["tests"]
