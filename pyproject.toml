[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
# E501 — long description strings in placeholder views are acceptable
# E402 — gi.require_version() must precede gi.repository imports (PyGObject requirement)
ignore = ["E501", "E402"]

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true
# PyGObject does not ship inline type stubs; ignore missing imports globally.
ignore_missing_imports = true
files = ["app/"]

[tool.pytest.ini_options]
testpaths = ["tests"]
